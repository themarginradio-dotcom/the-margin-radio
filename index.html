<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>118.0 The Margin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0c;
      --bg2: #141412;
      --line: rgba(255,255,255,0.07);
      --text: #e8e4db;
      --muted: rgba(232, 228, 219, 0.38);
      --accent: #c8b89a;
      --accent2: #7a6e5f;
      --red: #c0392b;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-weight: 300;
      overflow: hidden;
    }

    /* Subtle grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.4;
    }

    .layout {
      height: 100vh;
      display: grid;
      grid-template-rows: 1fr auto 1fr;
      grid-template-columns: 1fr;
      padding: 0 clamp(24px, 8vw, 120px);
    }

    /* Top bar */
    .topbar {
      display: flex;
      align-items: flex-end;
      padding-bottom: 32px;
      border-bottom: 1px solid var(--line);
      justify-content: space-between;
    }

    .freq {
      font-family: 'DM Mono', monospace;
      font-size: clamp(11px, 1.2vw, 13px);
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .live-indicator {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      letter-spacing: 0.14em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--red);
      opacity: 0;
      animation: blink 2s ease-in-out infinite;
    }

    .live-dot.active { opacity: 1; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    /* Center stage */
    .center {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0;
      padding: 48px 0;
    }

    .station-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(52px, 10vw, 120px);
      font-weight: 300;
      letter-spacing: -0.02em;
      line-height: 0.92;
      color: var(--text);
      animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .station-name em {
      font-style: italic;
      color: var(--accent);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .tagline {
      margin-top: 20px;
      font-size: clamp(11px, 1.1vw, 12px);
      color: var(--muted);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      animation: fadeUp 1.2s 0.15s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    /* Now playing */
    .now-playing-wrap {
      margin-top: 40px;
      animation: fadeUp 1.2s 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .now-playing-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 8px;
    }

    .now-playing-track {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(18px, 2.5vw, 28px);
      font-weight: 300;
      font-style: italic;
      color: var(--accent);
      min-height: 1.4em;
      transition: opacity 0.4s ease;
    }

    .now-playing-track.updating { opacity: 0.3; }

    /* Player */
    .player-wrap {
      margin-top: 36px;
      animation: fadeUp 1.2s 0.45s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .player-controls {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .play-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid rgba(200, 184, 154, 0.3);
      background: transparent;
      color: var(--accent);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    .play-btn:hover {
      border-color: var(--accent);
      background: rgba(200, 184, 154, 0.06);
    }

    .play-btn svg { width: 16px; height: 16px; }

    .volume-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .vol-icon {
      color: var(--accent2);
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .volume-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 80px;
      height: 1px;
      background: var(--line);
      outline: none;
      cursor: pointer;
      position: relative;
    }

    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    .volume-slider::-webkit-slider-thumb:hover { transform: scale(1.3); }

    .status-text {
      font-size: 10px;
      letter-spacing: 0.14em;
      color: var(--accent2);
      text-transform: uppercase;
      margin-left: 4px;
    }

    /* Bottom bar */
    .bottombar {
      display: flex;
      align-items: flex-start;
      padding-top: 28px;
      border-top: 1px solid var(--line);
      justify-content: space-between;
    }

    .listeners {
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .listeners span {
      color: var(--accent);
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-style: italic;
      vertical-align: middle;
      margin-right: 4px;
    }

    .time-display {
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    /* Waveform visualizer */
    .waveform {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 20px;
      margin-left: 16px;
    }

    .waveform-bar {
      width: 2px;
      background: var(--accent);
      border-radius: 1px;
      opacity: 0.4;
      animation: wave 1.2s ease-in-out infinite;
      height: 4px;
      transition: height 0.3s ease;
    }

    .waveform.playing .waveform-bar { opacity: 0.7; }

    .waveform-bar:nth-child(1) { animation-delay: 0s; }
    .waveform-bar:nth-child(2) { animation-delay: 0.1s; }
    .waveform-bar:nth-child(3) { animation-delay: 0.2s; }
    .waveform-bar:nth-child(4) { animation-delay: 0.15s; }
    .waveform-bar:nth-child(5) { animation-delay: 0.05s; }
    .waveform-bar:nth-child(6) { animation-delay: 0.25s; }
    .waveform-bar:nth-child(7) { animation-delay: 0.1s; }

    @keyframes wave {
      0%, 100% { height: 3px; }
      50% { height: 14px; }
    }

    .waveform:not(.playing) .waveform-bar {
      animation-play-state: paused;
      height: 3px;
    }

    audio { display: none; }

    @media (max-width: 600px) {
      .layout { padding: 0 24px; }
      .topbar { padding-bottom: 20px; }
      .center { padding: 32px 0; }
      html, body { overflow: auto; }
    }
  </style>
</head>
<body>
<div class="layout">

  <!-- Top bar -->
  <div class="topbar">
    <div class="freq">118.0 FM</div>
    <div class="live-indicator">
      <div class="live-dot" id="liveDot"></div>
      <span id="liveText">Off air</span>
    </div>
  </div>

  <!-- Center -->
  <div class="center">
    <h1 class="station-name">The <em>Margin</em></h1>
    <p class="tagline">Human-curated music — nothing algorithmic, nothing accidental</p>

    <div class="now-playing-wrap">
      <div class="now-playing-label">Now playing</div>
      <div class="now-playing-track" id="nowPlaying">—</div>
    </div>

    <div class="player-wrap">
      <div class="player-controls">
        <button class="play-btn" id="playBtn" onclick="togglePlay()">
          <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5,3 19,12 5,21"/>
          </svg>
        </button>

        <div class="waveform" id="waveform">
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
        </div>

        <div class="volume-wrap">
          <svg class="vol-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
          <input type="range" class="volume-slider" id="volSlider" min="0" max="1" step="0.01" value="0.8" oninput="setVolume(this.value)">
        </div>

        <span class="status-text" id="statusText">Tune in</span>
      </div>
    </div>
  </div>

  <!-- Bottom bar -->
  <div class="bottombar">
    <div class="listeners">
      <span id="listenerCount">—</span> listening now
    </div>
    <div class="time-display" id="clock"></div>
  </div>

</div>

<audio id="radioAudio" preload="none"></audio>

<script>
  // ─── CONFIGURATION ───────────────────────────────────────────────
  // Replace this with your actual Cloudflare tunnel URL or permanent domain
  // Example: 'https://surveillance-wifi-precipitation-library.trycloudflare.com'
  const STREAM_URL = 'https://deadline-airline-transition-file.trycloudflare.com/radio.mp3';

  // This is your Icecast status JSON endpoint — same base URL, different path
  const STATUS_URL = 'https://deadline-airline-transition-file.trycloudflare.com/status-json.xsl';
  // ─────────────────────────────────────────────────────────────────

  const audio = document.getElementById('radioAudio');
  const playBtn = document.getElementById('playBtn');
  const playIcon = document.getElementById('playIcon');
  const waveform = document.getElementById('waveform');
  const statusText = document.getElementById('statusText');
  const nowPlaying = document.getElementById('nowPlaying');
  const liveDot = document.getElementById('liveDot');
  const liveText = document.getElementById('liveText');
  const listenerCount = document.getElementById('listenerCount');

  let isPlaying = false;

  audio.volume = 0.8;
  audio.src = STREAM_URL;

  function togglePlay() {
    if (isPlaying) {
      audio.pause();
      audio.src = '';
      setUIState(false);
    } else {
      audio.src = STREAM_URL;
      audio.play().then(() => {
        setUIState(true);
      }).catch(() => {
        statusText.textContent = 'Error';
      });
    }
  }

  function setUIState(playing) {
    isPlaying = playing;
    if (playing) {
      playIcon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
      waveform.classList.add('playing');
      statusText.textContent = 'On air';
      liveDot.classList.add('active');
      liveText.textContent = 'Live';
    } else {
      playIcon.innerHTML = '<polygon points="5,3 19,12 5,21"/>';
      waveform.classList.remove('playing');
      statusText.textContent = 'Tune in';
      liveDot.classList.remove('active');
      liveText.textContent = 'Off air';
    }
  }

  function setVolume(v) {
    audio.volume = parseFloat(v);
  }

  // Fetch metadata from Icecast
  async function fetchMetadata() {
    try {
      const res = await fetch(STATUS_URL + '?_=' + Date.now());
      const data = await res.json();
      const source = data?.icestats?.source;
      if (!source) return;

      const src = Array.isArray(source) ? source[0] : source;
      const title = src?.title || src?.yp_currently_playing || null;
      const listeners = src?.listeners ?? '—';

      if (title && title !== nowPlaying.textContent) {
        nowPlaying.classList.add('updating');
        setTimeout(() => {
          nowPlaying.textContent = title;
          nowPlaying.classList.remove('updating');
        }, 400);
      }

      listenerCount.textContent = listeners;

    } catch (e) {
      // Silent fail — stream might be offline
    }
  }

  // Clock
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    const s = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('clock').textContent = `${h}:${m}:${s}`;
  }

  setInterval(updateClock, 1000);
  updateClock();

  // Poll metadata every 10 seconds
  setInterval(fetchMetadata, 10000);
  fetchMetadata();
</script>
</body>
</html>
